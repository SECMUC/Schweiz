name: Polizei-Monitor Schweiz – Täglicher Scraper

on:
  schedule:
    - cron: "0 6,12,18 * * *"   # 07:00 / 13:00 / 19:00 CET
  workflow_dispatch:              # Manueller Trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scraper ausführen
        run: python scraper.py

      - name: GitHub Step Summary schreiben
        run: cat summary.md >> $GITHUB_STEP_SUMMARY

      - name: Änderungen committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add incidents.json summary.md
          git diff --staged --quiet || git commit -m "chore: Scraper $(date +'%Y-%m-%d %H:%M')"
          git push
