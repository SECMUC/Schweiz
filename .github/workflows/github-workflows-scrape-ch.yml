name: Polizei-Monitor Schweiz – Täglicher Scraper

on:
  schedule:
    # Täglich um 07:00, 13:00 und 19:00 Uhr CET (UTC+1)
    - cron: "0 6,12,18 * * *"
  workflow_dispatch:  # Manueller Trigger aus GitHub UI

permissions:
  contents: write   # Für git push

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scraper ausführen
        run: |
          cd polizei-monitor-ch
          python scraper.py

      - name: GitHub Step Summary schreiben
        run: cat polizei-monitor-ch/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Änderungen committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add polizei-monitor-ch/incidents.json polizei-monitor-ch/summary.md
          git diff --staged --quiet || git commit -m "chore: CH Polizei-Scraper $(date +'%Y-%m-%d %H:%M')"
          git push
