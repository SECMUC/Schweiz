<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polizei-Monitor Schweiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- SheetJS für Excel-Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg:        #f4f6f9;
      --surface:   #ffffff;
      --border:    #e2e6ed;
      --border2:   #d0d5df;
      --accent:    #c8102e;   /* Schweizer Rot */
      --accent-lt: #fdf0f2;
      --text:      #1a1d23;
      --muted:     #6b7280;
      --muted2:    #9ca3af;
      --green:     #16a34a;
      --blue:      #2563eb;
      --orange:    #ea580c;
      --purple:    #7c3aed;
      --yellow:    #ca8a04;
      --row-hover: #f8f9fc;
      --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.10);
      --mono:      "DM Mono", monospace;
      --sans:      "DM Sans", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13.5px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: var(--shadow);
    }
    .logo {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -.01em;
    }
    .header-title span { color: var(--muted); font-weight: 400; }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.85)} }

    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 320px;
    }
    .search-wrap svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted2);
      pointer-events: none;
    }
    input[type=text] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 7px;
      padding: 7px 10px 7px 32px;
      font-family: var(--sans);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
    }
    input[type=text]:focus { border-color: var(--accent); background: #fff; }

    select {
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 7px;
      padding: 7px 10px;
      font-family: var(--sans);
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
    }
    select:focus { border-color: var(--accent); }

    /* Zeitraum-Buttons */
    .btn-group {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 7px;
      padding: 3px;
    }
    .btn-time {
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 5px;
      padding: 5px 12px;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-time:hover { background: var(--surface); color: var(--text); }
    .btn-time.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 1px 3px rgba(200,16,46,.3);
    }

    /* Export-Buttons */
    .export-group { display: flex; gap: 6px; margin-left: auto; }
    .btn-export {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 7px;
      padding: 6px 12px;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-export:hover { border-color: var(--accent); color: var(--accent); }
    .btn-export.excel { border-color: #16a34a22; }
    .btn-export.excel:hover { border-color: var(--green); color: var(--green); }

    /* ── KANTON-BAR ── */
    .kanton-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }
    .kanton-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-right: 4px;
    }
    .pill {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid var(--border2);
      background: var(--bg);
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
      user-select: none;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── STATS BAR ── */
    .stats-bar {
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .stats-count {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
    .stats-count strong { color: var(--text); }

    /* ── TABLE ── */
    .table-wrap {
      margin: 0 24px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #f8f9fb;
      border-bottom: 2px solid var(--border);
    }
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--text); }
    th .sort-arrow { margin-left: 4px; opacity: .4; }
    th.sorted .sort-arrow { opacity: 1; color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
      cursor: pointer;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    tbody tr.expanded { background: #fafbfd; }

    td {
      padding: 10px 14px;
      vertical-align: top;
      font-size: 13px;
    }
    td.date-col {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--muted);
      white-space: nowrap;
      min-width: 110px;
    }
    td.kanton-col { min-width: 60px; }
    .kanton-badge {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      background: var(--accent-lt);
      color: var(--accent);
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid #f0c0c8;
      display: inline-block;
    }
    td.title-col { min-width: 260px; max-width: 400px; }
    .row-title { font-weight: 500; line-height: 1.4; }
    td.cats-col { min-width: 120px; }
    .cat-badges { display: flex; flex-wrap: wrap; gap: 3px; }
    .cat-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--border2);
      color: var(--muted);
      white-space: nowrap;
    }
    .cat-badge.Unfall    { background:#fff7ed; border-color:#fed7aa; color:#c2410c }
    .cat-badge.Einbruch  { background:#faf5ff; border-color:#e9d5ff; color:#7c3aed }
    .cat-badge.Gewalt    { background:#fff1f2; border-color:#fecdd3; color:#be123c }
    .cat-badge.Brand     { background:#fff7ed; border-color:#fed7aa; color:#ea580c }
    .cat-badge.Drogen    { background:#f0fdf4; border-color:#bbf7d0; color:#16a34a }
    .cat-badge.Betrug    { background:#eff6ff; border-color:#bfdbfe; color:#2563eb }
    .cat-badge.Vermisst  { background:#fefce8; border-color:#fef08a; color:#ca8a04 }
    .cat-badge.Todesfälle{ background:#fff1f2; border-color:#fecdd3; color:#be123c; font-weight:700 }
    .cat-badge.Verhaftung{ background:#f0fdf4; border-color:#bbf7d0; color:#166534 }
    td.source-col {
      font-size: 11.5px;
      color: var(--muted2);
      max-width: 140px;
    }

    /* ── DETAIL ROW ── */
    .detail-row td {
      padding: 0;
      background: #f8f9fc;
      border-top: 1px solid var(--border);
    }
    .detail-inner {
      padding: 16px 20px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
    }
    .detail-text {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text);
      max-width: 780px;
    }
    .detail-text h4 {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .detail-meta {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
      max-width: 200px;
    }
    .tag-chip {
      font-size: 10px;
      background: var(--bg);
      border: 1px solid var(--border2);
      color: var(--muted);
      padding: 2px 7px;
      border-radius: 99px;
    }
    .btn-src {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 12px;
      font-weight: 500;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .btn-src:hover { opacity: .88; }

    /* ── LOAD MORE ── */
    .load-more-wrap { padding: 16px; text-align: center; }
    .btn-load {
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 7px;
      padding: 8px 24px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-load:hover { border-color: var(--accent); color: var(--accent); }

    /* ── EMPTY / LOADING ── */
    .state-msg {
      padding: 64px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }
    .state-msg .icon { font-size: 32px; margin-bottom: 10px; }

    @media (max-width: 768px) {
      .toolbar { padding: 10px 14px; }
      .kanton-bar, .stats-bar { padding: 8px 14px; }
      .table-wrap { margin: 0 14px 16px; }
      .export-group { display: none; }
      td.source-col, td.cats-col { display: none; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">✛</div>
  <div class="header-title">Polizei-Monitor <span>/ Schweiz</span></div>
  <div class="header-right">
    <div class="live-badge">
      <span class="live-dot"></span>
      <span id="last-updated">Lade…</span>
    </div>
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Suche: Zürich, Unfall, Raub…" />
  </div>

  <select id="cat-filter">
    <option value="">Alle Kategorien</option>
    <option>Unfall</option><option>Einbruch</option><option>Vermisst</option>
    <option>Drogen</option><option>Betrug</option><option>Brand</option>
    <option>Gewalt</option><option>Verkehr</option><option>Todesfälle</option>
    <option>Verhaftung</option><option>Sonstiges</option>
  </select>

  <!-- Zeitraum-Buttons -->
  <div class="btn-group">
    <button class="btn-time active" data-days="0">Alle</button>
    <button class="btn-time" data-days="1">Heute</button>
    <button class="btn-time" data-days="7">7 Tage</button>
    <button class="btn-time" data-days="14">14 Tage</button>
    <button class="btn-time" data-days="30">30 Tage</button>
  </div>

  <div class="export-group">
    <button class="btn-export" onclick="exportCSV()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      CSV
    </button>
    <button class="btn-export excel" onclick="exportExcel()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Excel
    </button>
    <button class="btn-export" onclick="exportJSON()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      JSON
    </button>
  </div>
</div>

<!-- KANTON-BAR -->
<div class="kanton-bar">
  <span class="kanton-label">Kanton</span>
  <div id="kanton-pills"></div>
</div>

<!-- STATS -->
<div class="stats-bar">
  <div class="stats-count" id="stats-count">Lade…</div>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <div id="loading" class="state-msg">
    <div class="icon">⏳</div>
    Lade Vorfälle…
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th data-col="date" class="sorted">Datum <span class="sort-arrow">↓</span></th>
        <th data-col="kanton">Kt. <span class="sort-arrow">↕</span></th>
        <th data-col="title">Vorfall <span class="sort-arrow">↕</span></th>
        <th data-col="categories">Kategorie <span class="sort-arrow">↕</span></th>
        <th data-col="source">Quelle <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="state-msg" style="display:none">
    <div class="icon">🔍</div>
    Keine Treffer für diese Filter.
  </div>
  <div class="load-more-wrap" id="load-more-wrap" style="display:none">
    <button class="btn-load" onclick="loadMore()">Weitere Einträge laden</button>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────
let allIncidents = [];
let filtered     = [];
let page         = 0;
const PAGE_SIZE  = 50;
let activeKanton = "";
let activeDays   = 0;
let sortCol      = "date";
let sortDir      = -1; // -1 = desc
let expandedId   = null;

// ── LOAD ───────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch("incidents.json?" + Date.now());
    allIncidents = await res.json();
    document.getElementById("loading").style.display = "none";
    document.getElementById("main-table").style.display = "table";
    buildKantonPills();
    applyAll();
    updateMeta();
  } catch(e) {
    document.getElementById("loading").innerHTML =
      '<div class="icon">⚠️</div>incidents.json nicht gefunden. Scraper noch nicht ausgeführt?';
  }
}

// ── KANTON PILLS ───────────────────────────────
function buildKantonPills() {
  const counts = {};
  allIncidents.forEach(i => counts[i.kanton] = (counts[i.kanton]||0)+1);
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,22);
  const wrap = document.getElementById("kanton-pills");
  wrap.innerHTML =
    `<span class="pill ${!activeKanton?'active':''}" onclick="setKanton('')">Alle</span>` +
    sorted.map(([k,c]) =>
      `<span class="pill ${activeKanton===k?'active':''}" onclick="setKanton('${k}')">${k}<small style="opacity:.6;margin-left:3px">${c}</small></span>`
    ).join("");
}

function setKanton(k) {
  activeKanton = k;
  buildKantonPills();
  applyAll();
}

// ── FILTERS ────────────────────────────────────
function applyAll() {
  const q      = document.getElementById("search").value.toLowerCase();
  const cat    = document.getElementById("cat-filter").value;
  const cutoff = activeDays ? new Date(Date.now() - activeDays*86400000) : null;

  filtered = allIncidents.filter(inc => {
    if (activeKanton && inc.kanton !== activeKanton) return false;
    if (cat && !inc.categories?.includes(cat))       return false;
    if (cutoff && new Date(inc.date) < cutoff)        return false;
    if (q) {
      const blob = `${inc.title} ${inc.summary} ${inc.kanton} ${(inc.tags||[]).join(" ")}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (Array.isArray(va)) va = va[0]||"";
    if (Array.isArray(vb)) vb = vb[0]||"";
    return va < vb ? sortDir : va > vb ? -sortDir : 0;
  });

  page = 0;
  expandedId = null;
  renderTable(true);
  document.getElementById("stats-count").innerHTML =
    `<strong>${filtered.length}</strong> von ${allIncidents.length} Vorfällen`;
}

// ── RENDER ─────────────────────────────────────
function renderTable(reset) {
  const tbody = document.getElementById("tbody");
  if (reset) tbody.innerHTML = "";

  const slice = filtered.slice(page * PAGE_SIZE, (page+1) * PAGE_SIZE);
  if (reset && slice.length === 0) {
    document.getElementById("empty").style.display = "block";
    document.getElementById("load-more-wrap").style.display = "none";
    return;
  }
  document.getElementById("empty").style.display = "none";

  slice.forEach(inc => {
    const tr = document.createElement("tr");
    tr.dataset.id = inc.id;
    tr.innerHTML = rowHTML(inc);
    tr.addEventListener("click", () => toggleDetail(inc, tr));
    tbody.appendChild(tr);
  });

  document.getElementById("load-more-wrap").style.display =
    (page+1)*PAGE_SIZE < filtered.length ? "block" : "none";
}

function loadMore() { page++; renderTable(false); }

function rowHTML(inc) {
  const d = new Date(inc.date);
  const dateStr = isNaN(d) ? inc.date :
    d.toLocaleDateString("de-CH",{day:"2-digit",month:"2-digit",year:"numeric"}) + " " +
    d.toLocaleTimeString("de-CH",{hour:"2-digit",minute:"2-digit"});
  const cats = (inc.categories||[]).map(c=>`<span class="cat-badge ${c}">${c}</span>`).join("");
  const src  = (inc.source||"").replace("Kantonspolizei ","Kapo ").replace(" (direkt)","");
  return `
    <td class="date-col">${esc(dateStr)}</td>
    <td class="kanton-col"><span class="kanton-badge">${esc(inc.kanton)}</span></td>
    <td class="title-col"><div class="row-title">${esc(inc.title)}</div></td>
    <td class="cats-col"><div class="cat-badges">${cats}</div></td>
    <td class="source-col">${esc(src)}</td>`;
}

function toggleDetail(inc, tr) {
  // Close existing
  const existing = document.getElementById("detail-" + (expandedId||"__none__"));
  if (existing) existing.remove();
  document.querySelectorAll("tr.expanded").forEach(r=>r.classList.remove("expanded"));

  if (expandedId === inc.id) { expandedId = null; return; }
  expandedId = inc.id;
  tr.classList.add("expanded");

  const tags = (inc.tags||[]).map(t=>`<span class="tag-chip">${esc(t)}</span>`).join("");
  const text = inc.summary || "Kein Volltext verfügbar.";

  const detail = document.createElement("tr");
  detail.id = "detail-" + inc.id;
  detail.className = "detail-row";
  detail.innerHTML = `<td colspan="5">
    <div class="detail-inner">
      <div class="detail-text">
        <h4>Originaltext</h4>
        ${esc(text)}
      </div>
      <div class="detail-meta">
        ${tags ? `<div class="detail-tags">${tags}</div>` : ""}
        ${inc.url ? `<a class="btn-src" href="${esc(inc.url)}" target="_blank" rel="noopener">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Zur Quelle
        </a>` : ""}
      </div>
    </div>
  </td>`;
  tr.insertAdjacentElement("afterend", detail);
}

// ── SORT ───────────────────────────────────────
document.querySelectorAll("th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = -1; }
    document.querySelectorAll("th").forEach(t => {
      t.classList.remove("sorted");
      t.querySelector(".sort-arrow").textContent = "↕";
    });
    th.classList.add("sorted");
    th.querySelector(".sort-arrow").textContent = sortDir === -1 ? "↓" : "↑";
    applyAll();
  });
});

// ── ZEITRAUM-BUTTONS ───────────────────────────
document.querySelectorAll(".btn-time").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".btn-time").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    activeDays = parseInt(btn.dataset.days) || 0;
    applyAll();
  });
});

// ── EVENTS ─────────────────────────────────────
document.getElementById("search").addEventListener("input", applyAll);
document.getElementById("cat-filter").addEventListener("change", applyAll);

// ── META ───────────────────────────────────────
function updateMeta() {
  if (!allIncidents.length) return;
  const last = new Date(allIncidents[0].scraped_at || allIncidents[0].date);
  document.getElementById("last-updated").textContent =
    "Stand: " + last.toLocaleString("de-CH",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

// ── EXPORT ─────────────────────────────────────
function exportCSV() {
  const cols = ["date","kanton","title","categories","summary","source","url"];
  const rows = [cols.join(";")].concat(
    filtered.map(i => cols.map(c => {
      const v = Array.isArray(i[c]) ? i[c].join("|") : (i[c]||"");
      return `"${String(v).replace(/"/g,'""')}"`;
    }).join(";"))
  );
  dl("polizei-ch.csv", "\uFEFF"+rows.join("\n"), "text/csv");
}

function exportExcel() {
  const cols = ["date","kanton","title","categories","summary","source","url"];
  const headers = ["Datum","Kanton","Titel","Kategorien","Text","Quelle","URL"];
  const data = [headers].concat(
    filtered.map(i => cols.map(c => {
      const v = Array.isArray(i[c]) ? i[c].join(", ") : (i[c]||"");
      return String(v);
    }))
  );
  const ws = XLSX.utils.aoa_to_sheet(data);
  // Spaltenbreiten
  ws['!cols'] = [14,8,50,30,80,20,40].map(w=>({wch:w}));
  // Header fett + Hintergrund
  const hdrFill = {fgColor:{rgb:"C8102E"}};
  const hdrFont = {bold:true,color:{rgb:"FFFFFF"}};
  for(let c=0;c<headers.length;c++){
    const cell = ws[XLSX.utils.encode_cell({r:0,c})];
    if(cell){ cell.s = {fill:hdrFill,font:hdrFont,alignment:{horizontal:"center"}}; }
  }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Vorfälle");
  XLSX.writeFile(wb, "polizei-monitor-schweiz.xlsx");
}

function exportJSON() {
  dl("polizei-ch.json", JSON.stringify(filtered,null,2), "application/json");
}

function dl(name, content, type) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = name; a.click();
}

// ── UTILS ──────────────────────────────────────
function esc(s="") {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
                  .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// ── START ──────────────────────────────────────
loadData();
</script>
